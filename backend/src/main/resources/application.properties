# =============================================
# Citizen360 — Spring Boot Application Config
# =============================================

# ---- Server ----
server.port=8080

# ---- MySQL DataSource ----
spring.datasource.url=jdbc:mysql://localhost:3306/citizen360_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ---- JWT ----
app.jwt.secret=Citizen360SuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong2024!
app.jwt.expiration-ms=86400000

# ---- File Upload ----
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=60MB
app.upload.dir=uploads

# ---- SQL Init ----
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ---- Mail ----
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=dummy_username
spring.mail.password=dummy_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
